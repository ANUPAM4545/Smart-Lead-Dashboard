version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: smart_leads_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    container_name: smart_leads_backend
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - MONGODB_URI=mongodb://mongodb:27017/smart-leads
      - JWT_SECRET=supersecretkey_change_in_production
      - NODE_ENV=production
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: smart_leads_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
